services:

  # ── Mycelium Core (always started) ───────────────────────────────────────────
  #
  # Single AgensGraph instance: relational tables (SQL) + knowledge graph
  # (openCypher) + vector search (pgvector) — all in one database.
  # When the cfn profile is active, also hosts cfn_mgmt and cfn_cp databases.

  mycelium-db:
    build:
      context: ../fastapi-backend
      dockerfile: docker/Dockerfile.agensgraph
    image: ghcr.io/mycelium-io/mycelium-db:latest
    pull_policy: always
    platform: linux/amd64
    container_name: mycelium-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MYCELIUM_DB_PASSWORD:-password}
      POSTGRES_DB: mycelium
    ports:
      - "${MYCELIUM_DB_PORT:-5432}:5432"
    volumes:
      - mycelium-db-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mycelium"]
      interval: 5s
      timeout: 5s
      retries: 10

  mycelium-backend:
    build:
      context: ../fastapi-backend
      dockerfile: Dockerfile
    image: ghcr.io/mycelium-io/mycelium-backend:latest
    pull_policy: always
    container_name: mycelium-backend
    restart: unless-stopped
    depends_on:
      mycelium-db:
        condition: service_healthy
      # When cfn profile is active, wait for mgmt plane before registering
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${MYCELIUM_DB_PASSWORD:-password}@mycelium-db:5432/mycelium
      GRAPH_DB_URL: postgresql://postgres:${MYCELIUM_DB_PASSWORD:-password}@mycelium-db:5432/mycelium
      CFN_MGMT_URL: ${CFN_MGMT_URL:-}
      COGNITION_FABRIC_NODE_URL: ${COGNITION_FABRIC_NODE_URL:-}
      WORKSPACE_ID: ${WORKSPACE_ID:-}
      API_BASE_URL: http://mycelium-backend:8000
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-6}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      COORDINATION_TICK_TIMEOUT_SECONDS: ${COORDINATION_TICK_TIMEOUT_SECONDS:-30}
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}:/root/.mycelium
    ports:
      - "${MYCELIUM_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Graph Viewer (optional, for development) ─────────────────────────────────

  mycelium-graph-viewer:
    image: skaiworldwide/agviewer:latest
    container_name: mycelium-graph-viewer
    restart: unless-stopped
    profiles: [dev]
    environment:
      DB_HOST: mycelium-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${MYCELIUM_DB_PASSWORD:-password}
      DB_NAME: mycelium
    ports:
      - "5457:3000"
    depends_on:
      - mycelium-db

  # ── CFN Stack (profile: cfn) ──────────────────────────────────────────────────

  ioc-cfn-mgmt-plane-svc:
    image: ghcr.io/outshift-open/ioc-cfn-mgmt-plane-svc:0.1.0
    container_name: ioc-cfn-mgmt-plane-svc
    restart: unless-stopped
    profiles: [cfn]
    depends_on:
      mycelium-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SERVICE_NAME: ioc-cfn-mgmt-plane-svc
      APPLICATION_VERSION: latest
      LOG_LEVEL: INFO
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-admin}
      POSTGRES_HOST: mycelium-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${CFN_DB:-cfn_mgmt}
      POSTGRES_USER: ${CFN_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${MYCELIUM_DB_PASSWORD:-password}
      PORT: 9000
      CFN_DEV_MODE: ${CFN_DEV_MODE:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s


  ioc-cognition-fabric-node-svc:
    image: ghcr.io/outshift-open/ioc-cognition-fabric-node-svc:0.1.0
    pull_policy: always
    platform: linux/amd64
    container_name: ioc-cognition-fabric-node-svc
    restart: unless-stopped
    profiles: [cfn]
    depends_on:
      mycelium-db:
        condition: service_healthy
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy
    ports:
      - "9002:9002"
    environment:
      MGMT_URL: http://ioc-cfn-mgmt-plane-svc:9000
      CFN_NAME: ${CFN_NAME:-mycelium-cfn}
      DB_HOST: mycelium-db
      DB_PORT: 5432
      DB_NAME: cfn_cp
      DB_USER: ${CFN_DB_USER:-postgres}
      DB_PASSWORD: ${MYCELIUM_DB_PASSWORD:-password}
      DB_SSL_MODE: disable
      PORT: 9002
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-6}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-29}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9002/api/internal/diagnostics/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s


volumes:
  mycelium-db-data:
