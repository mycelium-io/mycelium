name: Bug Report
description: Report a bug in Mycelium
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Affected Version
      description: What version of Mycelium are you running? (`mycelium --version`)
      placeholder: e.g. 0.1.9
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `mycelium ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error output.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version if applicable.
      placeholder: |
        OS: macOS 15.3
        Python: 3.12.2
        Docker: 27.0

  - type: markdown
    attributes:
      value: |
        For contributing guidelines, see [CONTRIBUTING.md](https://github.com/mycelium-io/mycelium/blob/main/CONTRIBUTING.md).
