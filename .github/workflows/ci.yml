name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      agensgraph:
        image: skaiworldwide/agensgraph:v2.16.0-alpine3.22
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mycelium
        options: >-
          --health-cmd "pg_isready -U postgres -d mycelium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: fastapi-backend
        run: uv sync --group dev

      - name: Install pgvector in AgensGraph
        run: |
          docker exec ${{ job.services.agensgraph.id }} sh -c "
            apk add --no-cache build-base git &&
            git clone --branch v0.8.0 https://github.com/pgvector/pgvector.git /tmp/pgvector &&
            cd /tmp/pgvector && make OPTFLAGS='' && make install &&
            rm -rf /tmp/pgvector && apk del build-base git
          "
          docker exec ${{ job.services.agensgraph.id }} psql -U postgres -d mycelium -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Lint
        working-directory: fastapi-backend
        run: uv run ruff check .

      - name: Format check
        working-directory: fastapi-backend
        run: uv run ruff format --check .

      - name: Unit tests (SQLite)
        working-directory: fastapi-backend
        env:
          MYCELIUM_STUB_EMBEDDINGS: "1"
        run: uv run pytest tests/ -x -q --ignore=tests/test_integration.py

      - name: Integration tests (AgensGraph + pgvector)
        working-directory: fastapi-backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/mycelium
          GRAPH_DB_URL: postgresql://postgres:password@localhost:5432/mycelium
          MYCELIUM_STUB_EMBEDDINGS: "1"
        run: uv run pytest tests/test_integration.py -x -q

  lint-cli:
    name: CLI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: mycelium-cli
        run: uv sync --group dev

      - name: Lint
        working-directory: mycelium-cli
        run: uv run ruff check src/

      - name: Format check
        working-directory: mycelium-cli
        run: uv run ruff format --check src/

  test-openclaw-plugin:
    name: OpenClaw plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install plugin dev dependencies
        working-directory: mycelium-cli/src/mycelium/adapters/openclaw/mycelium/plugin
        run: npm install --no-audit --no-fund --silent

      - name: Run unit tests
        working-directory: mycelium-cli/src/mycelium/adapters/openclaw/mycelium/plugin
        run: npm test

  build-frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mycelium-frontend/package-lock.json

      - name: Install dependencies
        working-directory: mycelium-frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: mycelium-frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: mycelium-frontend
        run: npx next build
