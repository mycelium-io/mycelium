name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets
  packages: write   # needed to push to GHCR

jobs:
  publish-images:
    name: Build and push Docker images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push mycelium-db
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: fastapi-backend
          file: fastapi-backend/docker/Dockerfile.agensgraph
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mycelium-db:latest
            ghcr.io/${{ github.repository_owner }}/mycelium-db:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-db:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-db:cache,mode=max

      - name: Build and push mycelium-backend
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: fastapi-backend
          file: fastapi-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mycelium-backend:latest
            ghcr.io/${{ github.repository_owner }}/mycelium-backend:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-backend:cache,mode=max

  build-binaries:
    needs: publish-images
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: darwin-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Bump version to match tag
        working-directory: mycelium-cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" pyproject.toml && rm -f pyproject.toml.bak

      - name: Build mycelium-client wheel
        working-directory: mycelium-client
        run: uv build --wheel

      - name: Install CLI + client + PyInstaller
        working-directory: mycelium-cli
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python \
            -e . \
            ../mycelium-client/dist/*.whl \
            pyinstaller

      - name: Build binary
        working-directory: mycelium-cli
        run: |
          .venv/bin/python -c "from mycelium.cli import app; app()" --help > /dev/null 2>&1 || true
          .venv/bin/pyinstaller \
            --onefile \
            --name mycelium \
            --collect-all mycelium \
            --collect-all pyfiglet \
            --hidden-import mycelium_backend_client \
            -p src \
            src/mycelium/cli.py
          mv dist/mycelium dist/mycelium-${{ matrix.platform }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mycelium-${{ matrix.platform }}
          path: mycelium-cli/dist/mycelium-${{ matrix.platform }}

  build-and-release:
    needs: [publish-images, build-binaries]
    name: Build wheel and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Bump version to match tag
        working-directory: mycelium-cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel
        working-directory: mycelium-cli
        run: uv build --wheel

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download linux binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mycelium-linux-x86_64
          path: mycelium-cli/dist/binaries

      - name: Download darwin binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mycelium-darwin-arm64
          path: mycelium-cli/dist/binaries

      - name: Generate checksums
        run: |
          cd mycelium-cli/dist
          sha256sum *.whl binaries/mycelium-* > binaries/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mycelium ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/mycelium-io/mycelium/main/install.sh | bash
            ```

            Or install a specific version:
            ```bash
            uv tool install mycelium-cli==${{ steps.version.outputs.version }}
            ```

            ## What's changed

            See [commits since last release](https://github.com/mycelium-io/mycelium/commits/${{ github.ref_name }}).
          files: |
            mycelium-cli/dist/*.whl
            mycelium-cli/dist/binaries/mycelium-*
            mycelium-cli/dist/binaries/checksums.txt
          fail_on_unmatched_files: true

  update-tap:
    needs: build-and-release
    name: Update homebrew tap
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download binaries and compute SHA256
        id: shas
        run: |
          curl -fsSL -o mycelium-darwin-arm64 \
            https://github.com/mycelium-io/mycelium/releases/download/${{ github.ref_name }}/mycelium-darwin-arm64
          curl -fsSL -o mycelium-linux-x86_64 \
            https://github.com/mycelium-io/mycelium/releases/download/${{ github.ref_name }}/mycelium-linux-x86_64
          echo "darwin=$(sha256sum mycelium-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux=$(sha256sum mycelium-linux-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: mycelium-io/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DARWIN_SHA="${{ steps.shas.outputs.darwin }}"
          LINUX_SHA="${{ steps.shas.outputs.linux }}"
          FORMULA="homebrew-tap/Formula/mycelium.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          # darwin sha is the one after "on_arm do" block
          awk -v ver="$VERSION" -v dsha="$DARWIN_SHA" -v lsha="$LINUX_SHA" '
            /on_arm do/{arm=1}
            /on_intel do/{arm=0; intel=1}
            arm && /sha256/{sub(/sha256 ".*"/, "sha256 \""dsha"\""); arm=0}
            intel && /sha256/{sub(/sha256 ".*"/, "sha256 \""lsha"\""); intel=0}
            {print}
          ' "$FORMULA" > /tmp/mycelium.rb && mv /tmp/mycelium.rb "$FORMULA"

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mycelium.rb
          git diff --staged --quiet || git commit -m "chore: bump mycelium to v${{ steps.version.outputs.version }}"
          git push
  publish-clawhub:
    needs: build-and-release
    name: Publish skill to clawhub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to clawhub
        run: |
          curl -fsSL -X POST https://clawhub.ai/api/v1/skills \
            -H "Authorization: Bearer ${{ secrets.CLAWHUB_TOKEN }}" \
            -F "payload={\"slug\":\"mycelium-io\",\"displayName\":\"Mycelium\",\"version\":\"${{ steps.version.outputs.version }}\",\"changelog\":\"See https://github.com/mycelium-io/mycelium/releases/tag/${{ github.ref_name }}\",\"acceptLicenseTerms\":true,\"tags\":[\"latest\"]}" \
            -F "files=@mycelium-cli/src/mycelium/adapters/openclaw/extensions/mycelium/skills/mycelium/SKILL.md;type=text/markdown;filename=SKILL.md"
