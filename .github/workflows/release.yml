name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets
  packages: write   # needed to push to GHCR

jobs:
  publish-images:
    name: Build and push Docker images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push mycelium-db
        uses: docker/build-push-action@v6
        with:
          context: fastapi-backend
          file: fastapi-backend/docker/Dockerfile.agensgraph
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mycelium-db:latest
            ghcr.io/${{ github.repository_owner }}/mycelium-db:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-db:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-db:cache,mode=max

      - name: Build and push mycelium-backend
        uses: docker/build-push-action@v6
        with:
          context: fastapi-backend
          file: fastapi-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mycelium-backend:latest
            ghcr.io/${{ github.repository_owner }}/mycelium-backend:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mycelium-backend:cache,mode=max

  build-binaries:
    needs: publish-images
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Build mycelium-client wheel
        working-directory: mycelium-client
        run: uv build --wheel

      - name: Install CLI + client + PyInstaller
        working-directory: mycelium-cli
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python \
            -e . \
            ../mycelium-client/dist/*.whl \
            pyinstaller

      - name: Build binary
        working-directory: mycelium-cli
        run: |
          .venv/bin/python -c "from mycelium.cli import app; app()" --help > /dev/null 2>&1 || true
          .venv/bin/pyinstaller \
            --onefile \
            --name mycelium \
            --collect-all mycelium \
            --hidden-import mycelium_backend_client \
            -p src \
            src/mycelium/cli.py
          mv dist/mycelium dist/mycelium-${{ matrix.platform }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycelium-${{ matrix.platform }}
          path: mycelium-cli/dist/mycelium-${{ matrix.platform }}

  build-and-release:
    needs: [publish-images, build-binaries]
    name: Build wheel and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Bump version to match tag
        working-directory: mycelium-cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel
        working-directory: mycelium-cli
        run: uv build --wheel

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: mycelium-linux-x86_64
          path: mycelium-cli/dist/binaries

      - name: Download darwin binary
        uses: actions/download-artifact@v4
        with:
          name: mycelium-darwin-arm64
          path: mycelium-cli/dist/binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mycelium ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/mycelium-io/mycelium/main/install.sh | bash
            ```

            Or install a specific version:
            ```bash
            uv tool install mycelium-cli==${{ steps.version.outputs.version }}
            ```

            ## What's changed

            See [commits since last release](https://github.com/mycelium-io/mycelium/commits/${{ github.ref_name }}).
          files: |
            mycelium-cli/dist/*.whl
            mycelium-cli/dist/binaries/mycelium-*
          fail_on_unmatched_files: true
