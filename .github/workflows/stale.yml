name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale due to 60 days of inactivity. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This pull request has been automatically marked as stale due to 60 days of inactivity. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'This issue was closed due to inactivity.'
          close-pr-message: 'This pull request was closed due to inactivity.'
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
